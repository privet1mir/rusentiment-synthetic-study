project_name: rusentiment_synthetic_study
experiment_name: generate_synthetic_diverse_20
prompt_type: decoding_params

generator:
  dataset_path: data_synthetic
  num_samples: 1500
  labels:
    - negative
    - neutral
    - positive
  labels_distribution:
    neutral: 0.5
    negative: 0.25
    positive: 0.25
  deduplication: false
  provider: OpenAI
  model: gpt-5.4-mini-2026-03-17

  # decoding params
  temperature: 1.6
  top_p: 1.0
  frequency_penalty: 1.2
  presence_penalty: 1.0
  max_completion_tokens: 100
